services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lrag-net

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lrag-net

  ingestion-worker:
    build: ./ingestion-worker
    ports:
      - "8000:8000"
    volumes:
      - ./documents:/documents:ro
      - ingestion_cache:/cache
    environment:
      - OLLAMA_URL=http://ollama:11434
      - QDRANT_URL=http://qdrant:6333
      - EMBED_MODEL=nomic-embed-text
      - CHAT_MODEL=qwen2.5:3b
      - COLLECTION_NAME=documents
      - WATCH_DIR=/documents
      - WATCH_POLL_SECONDS=10
    depends_on:
      ollama:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - lrag-net

  chat-ui:
    build: ./chat-ui
    ports:
      - "3000:3000"
    environment:
      - PUBLIC_API_URL=http://localhost:8000
      - PUBLIC_OLLAMA_URL=http://localhost:11434
    depends_on:
      - ingestion-worker
    networks:
      - lrag-net

volumes:
  ollama_data:
  qdrant_data:
  ingestion_cache:

networks:
  lrag-net:
    driver: bridge
